<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Godads.ai — Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Geist Mono', monospace;
  background: #080B10;
  color: #F0EDE8;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px 24px;
  overflow: hidden;
  position: relative;
}

/* grain */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity: 0.03;
  pointer-events: none;
  z-index: 10;
}

/* glow */
.glow {
  position: fixed;
  width: 600px; height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,77,46,0.10) 0%, transparent 68%);
  top: 50%; left: 50%;
  transform: translate(-50%, -60%);
  pointer-events: none;
  animation: breathe 9s ease-in-out infinite;
}
@keyframes breathe {
  0%,100% { opacity: 1; transform: translate(-50%,-60%) scale(1); }
  50%      { opacity: 0.6; transform: translate(-50%,-60%) scale(1.2); }
}

/* content */
.wrap {
  position: relative; z-index: 2;
  display: flex; flex-direction: column;
  align-items: center;
  animation: up 0.8s cubic-bezier(.16,1,.3,1) both;
}

.status {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase;
  color: rgba(240,237,232,0.32);
  margin-bottom: 40px;
}
.dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: #F0C040;
  box-shadow: 0 0 6px #F0C040;
  animation: blink 2.4s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }

h1 {
  font-family: 'Instrument Serif', serif;
  font-size: clamp(56px, 12vw, 110px);
  line-height: 0.95;
  letter-spacing: -3px;
  color: #F0EDE8;
  margin-bottom: 6px;
}
h1 em {
  font-style: italic;
  color: #FF4D2E;
}

.divider {
  width: 32px; height: 1px;
  background: #FF4D2E;
  margin: 32px auto;
  animation: expand 0.6s 0.5s both;
}
@keyframes expand { from{width:0} to{width:32px} }

.tagline {
  font-size: clamp(13px, 2vw, 15px);
  color: rgba(240,237,232,0.36);
  letter-spacing: 0.3px;
  line-height: 1.7;
  max-width: 360px;
  margin-bottom: 48px;
  font-weight: 300;
}
.tagline strong {
  color: rgba(240,237,232,0.65);
  font-weight: 400;
}

.email-link {
  font-family: 'Geist Mono', monospace;
  font-size: clamp(13px, 2vw, 15px);
  color: rgba(240,237,232,0.45);
  text-decoration: none;
  letter-spacing: 0.5px;
  border-bottom: 1px solid rgba(240,237,232,0.1);
  padding-bottom: 3px;
  transition: color 0.2s, border-color 0.2s;
}
.email-link:hover {
  color: #F0EDE8;
  border-color: rgba(240,237,232,0.3);
}

footer {
  position: fixed; bottom: 32px;
  font-size: 10px; letter-spacing: 1px;
  color: rgba(240,237,232,0.13);
  text-transform: uppercase;
  z-index: 2;
}

@keyframes up {
  from { opacity:0; transform: translateY(28px); }
  to   { opacity:1; transform: translateY(0); }
}
</style>
</head>
<body>

<div class="glow"></div>

<div class="wrap">
  <div class="status">
    <span class="dot"></span>
    Coming soon
  </div>

  <h1>go<em>dads</em>.ai</h1>

  <div class="divider"></div>

  <p class="tagline">
    <strong>AI-powered ad management</strong> for Google & Meta.<br>
    Launch campaigns in minutes. Let the AI handle the rest.
  </p>

  <a class="email-link" href="mailto:hello@godads.ai">hello@godads.ai</a>
</div>

<footer>© 2025 Godads.ai</footer>

</body>
</html>
